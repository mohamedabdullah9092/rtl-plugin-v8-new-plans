    import React, { useState, useCallback, useEffect, useRef } from 'react';

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error: error };
      }

      componentDidCatch(error, errorInfo) {
        console.error("Uncaught error in React component:", error, errorInfo);
      }

      render() {
        if (this.state.hasError) {
          return (
            <div className="bg-brand-dark text-red-400 p-4 h-full flex flex-col items-center justify-center text-center">
              <h1 className="font-bold text-lg mb-2">Something went wrong.</h1>
              <p className="text-sm text-brand-text-secondary">Please try again or restart the plugin.</p>
              {this.state.error && (
                <pre className="mt-4 text-xs bg-brand-surface p-2 rounded-md text-left overflow-auto max-w-full">
                  {this.state.error.toString()}
                </pre>
              )}
            </div>
          );
        }
        return this.props.children;
      }
    }

    // --- Service: translationService ---
    let geminiAI;

    // --- New Batch Translation Logic ---

    async function translateBatchWithAI(texts, from, to, provider, apiKey) {
      if (!texts || texts.length === 0) return [];

      const fromLanguageName = from === 'auto' ? 'auto-detect' : from;
      const prompt = `You are an expert UI/UX localizer. I will provide a JSON array of strings to be translated from ${fromLanguageName} to ${to}. Your task is to translate each string and return a JSON array containing the translations in the exact same order. The translation must be natural and context-aware. Translate only the text provided. Do not add any extra words, explanations, or markdown formatting. Your entire response must be ONLY the translated JSON array.\n\nOriginal texts: ${JSON.stringify(texts)}\n\nTranslated texts:`;

      let resultText;

      if (provider === 'gemini') {
        if (!geminiAI) throw new Error("Gemini AI client is not initialized.");
        const response = await geminiAI.models.generateContent({
          model: 'gemini-2.5-flash',
          contents: prompt,
          config: {
            temperature: 0.2,
            maxOutputTokens: 2000,
            responseMimeType: "application/json",
            responseSchema: {
              type: Type.ARRAY,
              items: {
                type: Type.STRING,
                description: "A translated string in the target language."
              }
            }
          }
        });
        resultText = response.text;
      } else if (provider === 'openai') {
        if (!apiKey) throw new Error("OpenAI API key is not set.");
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [{ role: "user", content: prompt }],
            max_tokens: 2000,
            temperature: 0.1,
          }),
        });
        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(`OpenAI API error (${response.status}): ${(errorData.error && errorData.error.message) || 'Unknown error'}`);
        }
        const data = await response.json();
        resultText = data.choices[0].message.content.trim();
      } else {
        throw new Error("Unsupported AI provider for batch translation.");
      }

      if (!resultText) throw new Error(`${provider} returned an empty response.`);

      let cleanedText = resultText.trim();
      // With responseSchema, Gemini should return clean JSON. We keep the robust parsing for OpenAI as a fallback.
      if (provider !== 'gemini') {
        if (cleanedText.startsWith('```json')) cleanedText = cleanedText.slice(7);
        if (cleanedText.endsWith('```')) cleanedText = cleanedText.slice(0, -3);

        const startIndex = cleanedText.indexOf('[');
        const endIndex = cleanedText.lastIndexOf(']');
        if (startIndex === -1 || endIndex === -1) throw new Error(`Failed to parse JSON array from ${provider}. Response: ${cleanedText}`);

        cleanedText = cleanedText.substring(startIndex, endIndex + 1);
      }

      try {
        const translatedArray = JSON.parse(cleanedText);
        if (!Array.isArray(translatedArray)) throw new Error("Parsed response is not an array.");
        if (translatedArray.length !== texts.length) throw new Error(`Mismatch in translation count. Expected ${texts.length}, got ${translatedArray.length}.`);
        return translatedArray;
      } catch (e) {
        console.error(`Failed to parse JSON from ${provider}:`, e.message, "Response:", cleanedText);
        throw new Error(`Could not parse JSON from ${provider}.`);
      }
    }

    async function translateWithGoogle(text, fromLang, toLang) {
      if (!text || !text.trim()) return "";
      try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${fromLang}&tl=${toLang}&dt=t&q=${encodeURIComponent(text)}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error(`Google Translate API error: ${response.status}`);
        const data = await response.json();
        if (Array.isArray(data) && Array.isArray(data[0]) && Array.isArray(data[0][0])) {
          let translatedText = data[0].map(item => item[0]).join('');
          if (translatedText) return translatedText.trim();
        }
        throw new Error("Invalid response from Google Translate API");
      } catch (e) {
        console.error("Google Translate fetch failed:", e.message);
        return text; // Return original text on failure
      }
    }

    async function translateBatch(texts, from, to, apiKeys, onProgress) {
      const CHUNK_SIZE = 25;
      const MAX_PARALLEL_CHUNKS = 3;
      const GOOGLE_PARALLEL_LIMIT = 6;
      const translationCache = new Map();
      const uniqueTexts = [];

      for (const text of texts) {
        if (!translationCache.has(text)) {
          translationCache.set(text, null);
          uniqueTexts.push(text);
        }
      }

      const totalTexts = uniqueTexts.length;
      if (totalTexts === 0) return [];

      const mapTranslationsToOriginalOrder = () => texts.map(text => {
        const translated = translationCache.get(text);
        return translated == null ? text : translated;
      });

      const runParallel = async (items, limit, worker) => {
        const results = new Array(items.length);
        let nextIndex = 0;

        const runWorker = async () => {
          while (nextIndex < items.length) {
            const currentIndex = nextIndex++;
            results[currentIndex] = await worker(items[currentIndex], currentIndex);
          }
        };

        const workerCount = Math.min(limit, items.length);
        await Promise.all(Array.from({ length: workerCount }, runWorker));
        return results;
      };

      const translateWithProvider = async (provider, apiKey) => {
        const providerName = provider.charAt(0).toUpperCase() + provider.slice(1);
        const chunks = [];
        let processedCount = 0;

        for (let i = 0; i < totalTexts; i += CHUNK_SIZE) {
          chunks.push({
            texts: uniqueTexts.slice(i, i + CHUNK_SIZE)
          });
        }

        if (onProgress) onProgress(0, totalTexts, providerName);

        const chunkResults = await runParallel(chunks, MAX_PARALLEL_CHUNKS, async (chunk) => {
          const chunkTranslations = await translateBatchWithAI(chunk.texts, from, to, provider, apiKey);
          if (chunkTranslations.length !== chunk.texts.length) {
            throw new Error(`Translation count mismatch from ${providerName}.`);
          }
          processedCount += chunk.texts.length;
          if (onProgress) onProgress(processedCount, totalTexts, providerName);
          return chunkTranslations;
        });

        chunkResults.forEach((chunkTranslations, chunkIndex) => {
          const chunk = chunks[chunkIndex];
          chunkTranslations.forEach((translatedText, offset) => {
            translationCache.set(chunk.texts[offset], translatedText);
          });
        });

        return mapTranslationsToOriginalOrder();
      };

      if (apiKeys.gemini) {
        try {
          const allTranslatedTexts = await translateWithProvider('gemini', null);
          console.log('Successfully translated with Gemini.');
          return allTranslatedTexts;
        } catch (e) {
          console.warn("Gemini chunked translation failed, trying next provider. Error:", e.message);
        }
      }

      if (apiKeys.openai) {
        try {
          const allTranslatedTexts = await translateWithProvider('openai', apiKeys.openai);
          console.log('Successfully translated with OpenAI.');
          return allTranslatedTexts;
        } catch (e) {
          console.warn("OpenAI chunked translation failed, falling back. Error:", e.message);
        }
      }

      let processedCount = 0;
      const providerName = 'Google Translate';
      if (onProgress) onProgress(0, totalTexts, providerName);
      console.log('Falling back to Google Translate.');
      await runParallel(uniqueTexts, GOOGLE_PARALLEL_LIMIT, async (text) => {
        const translatedText = await translateWithGoogle(text, from, to);
        translationCache.set(text, translatedText);
        processedCount++;
        if (onProgress) onProgress(processedCount, totalTexts, providerName);
      });
      return mapTranslationsToOriginalOrder();
    }

    const LanguageSelector = ({ value, onChange, options, disabled = false }) => (

          {options.map((lang) => <option key={lang.code} value={lang.code} className="bg-brand-dark text-brand-text-primary">{lang.name}</option>)}
        </select>
        <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-brand-text-secondary">
          <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" /></svg>
        </div>
      </div>
    );

    const Button = ({ children, variant = 'primary', isLoading = false, ...props }) => {
      const baseClasses = 'w-full flex items-center justify-center font-semibold py-3 rounded-xl transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-brand-dark focus:ring-brand-teal disabled:opacity-50 disabled:cursor-not-allowed transform hover:scale-[1.02] active:scale-[0.98]';
      const variantClasses = {
        primary: 'bg-brand-teal hover:bg-brand-teal-light text-brand-dark',
        secondary: 'bg-brand-surface hover:bg-brand-border text-brand-text-secondary border border-brand-border',
        'soft-primary': 'bg-brand-teal/10 hover:bg-brand-teal/20 text-brand-teal border border-brand-teal/30'
      };
      return <button className={`${baseClasses} ${variantClasses[variant]}`} {...props}>{isLoading ? <LoadingSpinner /> : null} {children}</button>;
    };

    const TabButton = ({ children, active, onClick }) => {
      const baseClasses = 'flex-1 py-3 px-4 font-semibold text-sm transition-all duration-200 focus:outline-none border-b-2';
      const activeClasses = active
        ? 'text-brand-teal border-brand-teal'
        : 'text-brand-text-secondary border-transparent hover:text-brand-text-primary hover:border-brand-border';
      return <button className={`${baseClasses} ${activeClasses}`} onClick={onClick}>{children}</button>;
    };

    const SearchableSelect = ({ options, value, onChange, placeholder, disabled, searchable = true, recentOptions = [] }) => {
      const [isOpen, setIsOpen] = useState(false);
      const [query, setQuery] = useState('');
      const wrapperRef = useRef(null);

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
            setIsOpen(false);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      useEffect(() => {
        if (!isOpen) {
          setQuery('');
        }
      }, [isOpen]);

      const filteredRecent = recentOptions.filter(option =>
        searchable ? option.toLowerCase().includes(query.toLowerCase()) : true
      );

      const filteredOptions = options.filter(option => {
        const matches = searchable ? option.toLowerCase().includes(query.toLowerCase()) : true;
        // If it's in recent, we don't necessarily want to hide it from main list, but let's hide it to avoid duplicates
        return matches && !recentOptions.includes(option);
      });

      const handleSelect = (option) => {
        onChange(option);
        setIsOpen(false);
        setQuery('');
      };

      return (
        <div ref={wrapperRef} className="relative">
          <div
            className={`nav-item flex items-center justify-between w-full bg-brand-dark text-brand-text-primary px-3 py-2 rounded-lg border border-brand-border cursor-pointer ${disabled ? 'opacity-50 cursor-not-allowed' : 'hover:border-brand-teal'}`}
            onClick={() => !disabled && setIsOpen(!isOpen)}
          >
            <span className={`truncate ${!value ? 'text-brand-text-secondary' : ''}`}>
              {value || placeholder}
            </span>
            <svg className={`w-4 h-4 ml-2 transition-transform ${isOpen ? 'transform rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
          </div>

          {isOpen && !disabled && (
            <div className="absolute z-50 w-full mt-1 bg-brand-surface border border-brand-border rounded-lg shadow-xl max-h-60 overflow-hidden flex flex-col">
              {searchable && (
                <div className="p-2 border-b border-brand-border sticky top-0 bg-brand-surface">
                  <input
                    type="text"
                    className="w-full bg-brand-dark text-brand-text-primary px-3 py-1.5 rounded-md text-sm border border-brand-border focus:outline-none focus:ring-1 focus:ring-brand-teal"
                    placeholder="Search..."
                    value={query}
                    onChange={(e) => setQuery(e.target.value)}
                    onClick={(e) => e.stopPropagation()}
                    autoFocus
                  />
                </div>
              )}
              <div className="overflow-y-auto flex-grow">
                {filteredRecent.length === 0 && filteredOptions.length === 0 ? (
                  <div className="px-4 py-2 text-sm text-brand-text-secondary">No options found</div>
                ) : (
                  <>
                    {filteredRecent.length > 0 && (
                      <>
                        <div className="px-4 py-1.5 text-[10px] font-bold text-brand-teal uppercase tracking-wider bg-brand-teal/5">Recent</div>
                        {filteredRecent.map(option => (
                          <div
                            key={`recent-${option}`}
                            className={`px-4 py-2 text-sm cursor-pointer hover:bg-brand-teal/10 hover:text-brand-teal ${value === option ? 'bg-brand-teal/20 text-brand-teal font-semibold' : 'text-brand-text-primary'}`}
                            onClick={() => handleSelect(option)}
                          >
                            {option}
                          </div>
                        ))}
                        {filteredOptions.length > 0 && <div className="border-t border-brand-border/50 my-1"></div>}
                      </>
                    )}

                    {filteredOptions.length > 0 && (
                      <>
                        {filteredRecent.length > 0 && <div className="px-4 py-1.5 text-[10px] font-bold text-brand-text-secondary uppercase tracking-wider">All Fonts</div>}
                        {filteredOptions.map(option => (
                          <div
                            key={option}
                            className={`px-4 py-2 text-sm cursor-pointer hover:bg-brand-teal/10 hover:text-brand-teal ${value === option ? 'bg-brand-teal/20 text-brand-teal font-semibold' : 'text-brand-text-primary'}`}
                            onClick={() => handleSelect(option)}
                          >
                            {option}
                          </div>
                        ))}
                      </>
                    )}
                  </>
                )}
              </div>
            </div>
          )}
        </div>
      );
    };


    const ApiKeysManager = ({ initialGeminiKey, initialOpenAIKey, onSave, onCancel, isSaving }) => {
      const [geminiKey, setGeminiKey] = useState(initialGeminiKey || '');
      const [openaiKey, setOpenaiKey] = useState(initialOpenAIKey || '');

      const handleSave = async () => {
        await onSave({ gemini: geminiKey, openai: openaiKey });
      };

      return (
        <div className="bg-brand-dark text-brand-text-primary font-sans flex flex-col h-full p-6">

              <p className="text-sm text-brand-text-secondary mt-1">Provide API keys for high-quality translations.</p>
            </div>

            <div className="space-y-4">
              <div className="space-y-1.5">
                <label htmlFor="gemini-key-input" className="text-xs font-medium text-brand-text-secondary">Gemini API Key (Recommended)</label>
                <input id="gemini-key-input" type="password" value={geminiKey} onChange={(e) => setGeminiKey(e.target.value)} placeholder="Enter Gemini key" disabled={isSaving} className="w-full bg-brand-surface border border-brand-border text-brand-text-primary text-sm rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-brand-teal focus:border-brand-teal disabled:opacity-50" />
              </div>

              <div className="space-y-1.5">
                <label htmlFor="openai-key-input" className="text-xs font-medium text-brand-text-secondary">OpenAI API Key (Fallback)</label>
                <input id="openai-key-input" type="password" value={openaiKey} onChange={(e) => setOpenaiKey(e.target.value)} placeholder="Enter OpenAI key" disabled={isSaving} className="w-full bg-brand-surface border border-brand-border text-brand-text-primary text-sm rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-brand-teal focus:border-brand-teal disabled:opacity-50" />
              </div>
            </div>

            <div className="space-y-3 pt-2">
              <Button onClick={handleSave} disabled={isSaving} isLoading={isSaving}>{isSaving ? 'Saving...' : 'Save Keys'}</Button>
              <Button onClick={onCancel} disabled={isSaving} variant="secondary">Cancel</Button>
            </div>
          </div>

          <div className="flex-shrink-0 text-center pb-2 space-y-2 text-xs text-brand-text-secondary">
            <p>Get keys from <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" className="text-brand-teal-light hover:underline">Google AI Studio</a> and <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener noreferrer" className="text-brand-teal-light hover:underline">OpenAI</a>.</p>
          </div>
        </div>
      );
    };

    const OnboardingTour = ({ tourConfig, onComplete }) => {
      const [currentStep, setCurrentStep] = useState(0);
      const [highlightStyle, setHighlightStyle] = useState({});
      const [popoverStyle, setPopoverStyle] = useState({});
      const popoverRef = useRef(null);

      const stepData = tourConfig[currentStep];

      useEffect(() => {
        const targetElement = stepData?.targetRef?.current;

        if (!targetElement) {
          setHighlightStyle({
            position: 'absolute',
            left: '8px', top: '8px', right: '8px', bottom: '8px',
            boxShadow: '0 0 0 9999px rgba(22, 28, 36, 0.7)',
            borderRadius: '12px',
            transition: 'all 0.3s ease-in-out',
            pointerEvents: 'none',
          });
          setPopoverStyle({
            position: 'absolute',
            top: '50%',
            left: '50%',
            transform: 'translate(-50%, -50%)',
            transition: 'all 0.3s ease-in-out',
          });
          return;
        }

        const rect = targetElement.getBoundingClientRect();
        const padding = 6;

        setHighlightStyle({
          position: 'absolute',
          left: `${rect.left - padding}px`,
          top: `${rect.top - padding}px`,
          width: `${rect.width + padding * 2}px`,
          height: `${rect.height + padding * 2}px`,
          boxShadow: '0 0 0 9999px rgba(22, 28, 36, 0.7)',
          borderRadius: '8px',
          transition: 'all 0.3s ease-in-out',
          pointerEvents: 'none',
        });

        const popoverRect = popoverRef.current?.getBoundingClientRect();
        const popoverHeight = popoverRect?.height || 200;
        const popoverWidth = popoverRect?.width || 256;

        let top = rect.bottom + 12; // Default below
        let left = rect.left + rect.width / 2 - popoverWidth / 2;

        if (top + popoverHeight > window.innerHeight - 10) {
          top = rect.top - popoverHeight - 12;
        }
        if (left < 10) left = 10;
        if (left + popoverWidth > window.innerWidth - 10) {
          left = window.innerWidth - popoverWidth - 10;
        }

        setPopoverStyle({
          position: 'absolute',
          top: `${top}px`,
          left: `${left}px`,
          transition: 'all 0.3s ease-in-out',
        });

      }, [currentStep, stepData]);

      const handleNext = () => {
        if (currentStep < tourConfig.length - 1) {
          setCurrentStep(currentStep + 1);
        } else {
          onComplete();
        }
      };

      const handlePrev = () => {
        if (currentStep > 0) {
          setCurrentStep(currentStep - 1);
        }
      };

      if (!stepData) return null;

      return (
        <div className="fixed inset-0 z-50">
          <div style={highlightStyle}></div>
          <div ref={popoverRef} style={popoverStyle} className="bg-brand-surface border border-brand-border rounded-xl p-5 w-64 shadow-2xl animate-fade-in">
            <div className="space-y-3">
              <h3 className="font-bold text-lg text-brand-text-primary">{stepData.title}</h3>
              <p className="text-sm text-brand-text-secondary">{stepData.text}</p>
            </div>

            <div className="flex justify-center my-4">
              {tourConfig.map((_, index) => (
                <div
                  key={index}
                  className={`h-2 w-2 rounded-full mx-1 transition-colors ${index === currentStep ? 'bg-brand-teal' : 'bg-brand-border'
                    }`}
                ></div>
              ))}
            </div>

            <div className="flex justify-between items-center mt-4">
              {currentStep > 0 ? (
                <button onClick={handlePrev} className="text-sm text-brand-text-secondary hover:text-white transition">Back</button>
              ) : <div />}

              <div className="flex items-center gap-2">
                {currentStep < tourConfig.length - 1 && (
                  <button onClick={onComplete} className="text-sm text-brand-text-secondary hover:text-white transition">Skip</button>
                )}
                <button
                  onClick={handleNext}
                  className="bg-brand-teal text-brand-dark font-semibold px-4 py-2 rounded-lg text-sm hover:bg-brand-teal-light transition"
                >
                  {currentStep === tourConfig.length - 1 ? 'Finish' : 'Next'}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const LANGUAGES = [
      { code: 'auto', name: 'Auto Detect' }, { code: 'en', name: 'English' }, { code: 'ar', name: 'Arabic' }, { code: 'es', name: 'Spanish' }, { code: 'fr', name: 'French' }, { code: 'de', name: 'German' }, { code: 'ja', name: 'Japanese' }, { code: 'ko', name: 'Korean' }, { code: 'pt', name: 'Portuguese' }, { code: 'ru', name: 'Russian' }, { code: 'zh', name: 'Chinese' }, { code: 'tr', name: 'Turkish' },
    ];

    const App = () => {
      const [isPro, setIsPro] = useState(false);
      const [trialCount, setTrialCount] = useState(null);
      const [isStatusLoading, setIsStatusLoading] = useState(true);
      const [showUpgradeScreen, setShowUpgradeScreen] = useState(false);

      const [geminiApiKey, setGeminiApiKey] = useState(null);
      const [openaiApiKey, setOpenaiApiKey] = useState(null);
      const apiKeysDataRef = useRef({ gemini: null, openai: null });

      const [areKeysChecked, setAreKeysChecked] = useState(false);
      const [showApiManager, setShowApiManager] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [onboardingStatus, setOnboardingStatus] = useState('loading'); // 'loading', 'pending', 'complete'

      const [isActivating, setIsActivating] = useState(false);
      const [activationError, setActivationError] = useState('');

      const [translateText, setTranslateText] = useState(true);
      const [fromLanguage, setFromLanguage] = useState('auto');
      const [toLanguage, setToLanguage] = useState('ar');
      const [mirrorInstances, setMirrorInstances] = useState(false);
      const [createVariant, setCreateVariant] = useState(false);

      const [isLoading, setIsLoading] = useState(false);
      const [statusMessage, setStatusMessage] = useState('');
      const [isError, setIsError] = useState(false);
      const [progress, setProgress] = useState(null);

      const [showSubscriptionManager, setShowSubscriptionManager] = useState(false);
      const [showUnsubscribeConfirm, setShowUnsubscribeConfirm] = useState(false);

      // --- Font Changer State ---
      const [activeTab, setActiveTab] = useState('mirror'); // 'mirror' | 'fontChanger'
      const [availableFonts, setAvailableFonts] = useState([]);
      const [recentFonts, setRecentFonts] = useState([]); // [NEW] Recently used fonts
      const [fontSearchQuery, setFontSearchQuery] = useState('');
      const [selectedFont, setSelectedFont] = useState(null);
      const [fontStyles, setFontStyles] = useState([]); // [NEW] Available weights for selected font
      const [selectedWeight, setSelectedWeight] = useState(''); // [NEW] Selected weight
      const [autoFitText, setAutoFitText] = useState(false); // [NEW] Auto-Fit Text
      const [textLayersCount, setTextLayersCount] = useState(0);
      const [isFontChanging, setIsFontChanging] = useState(false);

      // --- Refs for Onboarding Tour ---
      const langSelectorRef = useRef(null);
      const mainActionRef = useRef(null);
      const variantRef = useRef(null);
      const apiKeysRef = useRef(null);
      const menuButtonRef = useRef(null);

      const hasAnyKey = geminiApiKey || openaiApiKey;

      useEffect(() => {
        apiKeysDataRef.current = { gemini: geminiApiKey, openai: openaiApiKey };
      }, [geminiApiKey, openaiApiKey]);

      useEffect(() => {
        const handleMessage = async (event) => {
          if (!event.data.pluginMessage) return;
          const { type, payload } = event.data.pluginMessage;

          switch (type) {
            case 'user-status':
              setIsPro(payload.isPro);
              setTrialCount(payload.trialCount);
              setIsStatusLoading(false);
              break;
            case 'onboarding-status':
              setOnboardingStatus(payload.hasCompleted ? 'complete' : 'pending');
              break;
            case 'user-status-updated':
              setTrialCount(payload.trialCount);
              break;
            case 'license-verified':
              setIsPro(true);
              setIsActivating(false);
              setActivationError('');
              setShowUpgradeScreen(false);
              break;
            case 'license-invalid':
              setIsActivating(false);
              setActivationError(payload.message);
              break;
            case 'unsubscribe-success':
              setIsPro(payload.isPro);
              setTrialCount(payload.trialCount);
              setIsLoading(false);
              setShowUnsubscribeConfirm(false);
              setShowSubscriptionManager(false);
              break;
            case 'api-keys':
              setAreKeysChecked(true);
              setGeminiApiKey(payload.gemini);
              setOpenaiApiKey(payload.openai);
              if (payload.gemini) {
                try {
                  geminiAI = new GoogleGenAI({ apiKey: payload.gemini });
                } catch (e) {
                  console.error("Failed to initialize Gemini AI:", e);
                  setGeminiApiKey(null);
                }
              } else {
                geminiAI = null;
              }
              break;

            case 'api-keys-set':
              parent.postMessage({ pluginMessage: { type: 'get-api-keys' } }, '*');
              setShowApiManager(false);
              setIsSaving(false);
              break;

            case 'text-nodes-found':
              const { texts, fromLanguage: from, toLanguage: to } = payload;
              const onProgressCallback = (processed, total, provider) => {
                setProgress({ processed, total });
                const message = total > 0 && processed < total
                  ? `Translating ${processed}/${total} via ${provider}...`
                  : `Translating via ${provider}...`;
                setStatusMessage(message);
              };
              try {
                const apiKeys = apiKeysDataRef.current;
                const translations = await translateBatch(texts.map(t => t.characters), from, to, apiKeys, onProgressCallback);
                const translationsPayload = texts.map((textNode, index) => ({ id: textNode.id, newCharacters: translations[index] || textNode.characters }));
                parent.postMessage({ pluginMessage: { type: 'apply-translations', payload: { translations: translationsPayload } } }, '*');
              } catch (error) {
                console.error('Translation batch failed:', error);
                setIsLoading(false);
                setStatusMessage(`Translation failed: ${error.message}. Check keys or network.`);
                setIsError(true);
                setProgress(null);
              }
              break;

            case 'translation-progress':
              setProgress(payload);
              setStatusMessage(`Applying translation ${payload.processed} of ${payload.total}...`);
              break;

            case 'action-complete':
              setIsLoading(false);
              setStatusMessage('');
              setProgress(null);
              break;

            case 'available-fonts':
              setAvailableFonts(payload.fonts || []);
              break;
            case 'recent-fonts':
              setRecentFonts(payload.fonts || []);
              break;
            case 'font-styles':
              setFontStyles(payload.styles || []);
              break;
            case 'font-change-progress':
              setProgress(payload);
              setStatusMessage(`Changing font ${payload.processed}/${payload.total}...`);
              break;
            case 'font-change-complete':
              setIsFontChanging(false);
              setStatusMessage(payload.message || 'Font changed successfully!');
              setIsError(false);
              setProgress(null); // Clear progress bar

              // [NEW] Update recent fonts
              if (selectedFont) {
                setRecentFonts(prev => {
                  const filtered = prev.filter(f => f !== selectedFont);
                  const newRecent = [selectedFont, ...filtered].slice(0, 5);
                  parent.postMessage({ pluginMessage: { type: 'save-recent-fonts', payload: { fonts: newRecent } } }, '*');
                  return newRecent;
                });
              }

              setTimeout(() => setStatusMessage(''), 3000);
              break;
            case 'font-change-error':
              setIsFontChanging(false);
              setStatusMessage(payload.message || 'Failed to change font');
              setIsError(true);
              break;
            case 'text-layers-count':
              setTextLayersCount(payload.count || 0);
              break;
            case 'plugin-error':
              setIsError(true);
              setStatusMessage(payload.message);
              setIsLoading(false);
              break;
            case 'text-nodes-found':
            case 'action-complete':
              // Handled elsewhere or just close loading
              setIsLoading(false);
              break;
          }
        };

        window.addEventListener('message', handleMessage);

        parent.postMessage({ pluginMessage: { type: 'get-user-status' } }, '*');
        parent.postMessage({ pluginMessage: { type: 'get-onboarding-status' } }, '*');
        parent.postMessage({ pluginMessage: { type: 'get-api-keys' } }, '*');

        // Safety timeout: if backend doesn't respond in 4s, force-clear all loading states
        const safetyTimeout = setTimeout(() => {
          setIsStatusLoading(false);
          setAreKeysChecked(true);
          setOnboardingStatus(prev => prev === 'loading' ? 'complete' : prev);
        }, 4000);

        return () => {
          window.removeEventListener('message', handleMessage);
          clearTimeout(safetyTimeout);
        };
      }, []);

      // Request fonts when Font Changer tab is active
      useEffect(() => {
        if (activeTab === 'fontChanger') {
          if (availableFonts.length === 0) {
            parent.postMessage({ pluginMessage: { type: 'get-available-fonts' } }, '*');
          }
          parent.postMessage({ pluginMessage: { type: 'get-recent-fonts' } }, '*');
        }
      }, [activeTab]);

      // Request font styles when a font is selected
      useEffect(() => {
        if (selectedFont) {
          parent.postMessage({ pluginMessage: { type: 'get-font-styles', payload: { fontFamily: selectedFont } } }, '*');
          setSelectedWeight(''); // Reset selection when font changes
        } else {
          setFontStyles([]);
        }
      }, [selectedFont]);

      // Request text layer count
      useEffect(() => {
        if (activeTab === 'fontChanger') {
          parent.postMessage({ pluginMessage: { type: 'count-text-layers' } }, '*');
        }
      }, [activeTab, selectedFont]);

      const handleSwapLanguages = useCallback(() => {
        if (fromLanguage !== 'auto') {
          setFromLanguage(toLanguage);
          setToLanguage(fromLanguage);
        }
      }, [fromLanguage, toLanguage]);

      const handleAction = useCallback((actionType) => {
        if (!isPro && trialCount <= 0) {
          setShowUpgradeScreen(true);
          return;
        }

        setIsLoading(true);
        setStatusMessage('Processing selection...');
        setIsError(false);
        setProgress(null);

        const finalActionType = createVariant ? 'create-variant' : actionType;
        const shouldMirrorPayload = actionType === 'mirror-translate';

        parent.postMessage({
          pluginMessage: {
            type: 'run-action',
            payload: {
              actionType: finalActionType,
              fromLanguage,
              toLanguage,
              translateText,
              mirrorInstances,
              createVariant,
              shouldMirror: shouldMirrorPayload
            }
          }
        }, '*');
      }, [isPro, trialCount, fromLanguage, toLanguage, translateText, mirrorInstances, createVariant]);

      const handleSaveKeys = async ({ gemini, openai }) => {
        setIsSaving(true);
        parent.postMessage({ pluginMessage: { type: 'set-api-keys', payload: { gemini, openai } } }, '*');
      };

      const handleActivateLicense = (key) => {
        setIsActivating(true);
        setActivationError('');
        parent.postMessage({ pluginMessage: { type: 'verify-license', payload: { licenseKey: key } } }, '*');
      };

      const handleUnsubscribe = () => {
        setIsLoading(true);
        parent.postMessage({ pluginMessage: { type: 'unsubscribe' } }, '*');
      };

      const handleOnboardingComplete = () => {
        setOnboardingStatus('complete');
        parent.postMessage({ pluginMessage: { type: 'set-onboarding-status', payload: { completed: true } } }, '*');
      };

      const handleChangeFont = useCallback(() => {
        if (!isPro && trialCount <= 0) {
          setShowUpgradeScreen(true);
          return;
        }

        if (!selectedFont) {
          setStatusMessage('Please select a font first');
          setIsError(true);
          return;
        }

        setIsFontChanging(true);
        setStatusMessage('Changing font...');
        setIsError(false);

        parent.postMessage({
          pluginMessage: {
            type: 'change-font',
            payload: {
              fontFamily: selectedFont,
              fontStyle: selectedWeight || 'Auto Match',
              autoFit: autoFitText
            }
          }
        }, '*');
      }, [selectedFont, selectedWeight, autoFitText]);

      const tourConfig = [
        {
          title: 'Welcome to RTL Master!',
          text: "Let's take a quick tour to see how you can supercharge your RTL design workflow.",
          targetRef: null,
        },
        {
          targetRef: langSelectorRef,
          title: '1. Choose Languages',
          text: "Select your source and target languages. 'Auto Detect' is great for mixed content. Use the swap button to quickly reverse.",
        },
        {
          targetRef: mainActionRef,
          title: '2. The Magic Button',
          text: 'This is your primary action. It mirrors the layout of your selected frames and translates the text using powerful AI.',
        },
        {
          targetRef: variantRef,
          title: '3. Create Variants',
          text: 'Instead of modifying your design, you can create a new component variant with the mirrored and translated content. Perfect for component libraries!',
        },
        {
          targetRef: apiKeysRef,
          title: '4. Better Translations',
          text: 'For the highest quality, add your own Gemini or OpenAI API keys. The plugin will fall back to a free service if no keys are provided.',
        },
        {
          targetRef: menuButtonRef,
          title: '5. Discover More',
          text: 'Find plugin details, support links, and manage your PRO subscription here.',
        },
        {
          title: "You're all set!",
          text: "You're ready to master RTL design. Select a frame and give it a try!",
          targetRef: null,
        },
      ];

      const SubscriptionManager = ({ onClose, onUnsubscribe }) => (
        <div className="absolute inset-0 bg-brand-dark z-50 animate-fade-in p-6 flex flex-col justify-center">
          <div className="text-center space-y-4">
            <h1 className="text-2xl font-bold text-white">Subscription Details</h1>
            <p className="text-brand-text-secondary">You are currently on the <span className="text-brand-teal font-bold">PRO</span> plan.</p>
          </div>
          <div className="mt-8 space-y-3">
            <Button onClick={onUnsubscribe} variant="secondary">Unsubscribe</Button>
            <Button onClick={onClose}>Close</Button>
          </div>
        </div>
      );

      const UnsubscribeConfirmation = ({ onCancel, onConfirm, isProcessing }) => (
        <div className="absolute inset-0 bg-brand-dark/80 backdrop-blur-sm z-50 flex items-center justify-center p-6 animate-fade-in">
          <div className="bg-brand-surface border border-brand-border rounded-xl p-6 max-w-sm w-full text-center space-y-4">
            <h2 className="text-xl font-bold text-white">Are you sure?</h2>
            <p className="text-sm text-brand-text-secondary">
              You will lose access to all PRO features and your account will revert to the free plan with 20 trial uses. This action cannot be undone.
            </p>
            <div className="flex gap-3 pt-2">
              <Button onClick={onCancel} variant="secondary" disabled={isProcessing}>Cancel</Button>
              <Button onClick={onConfirm} style={{ backgroundColor: '#ef4444', color: 'white' }} disabled={isProcessing} isLoading={isProcessing}>
                {isProcessing ? 'Processing...' : 'Unsubscribe'}
              </Button>
            </div>
          </div>
        </div>
      );

      if (isStatusLoading || !areKeysChecked || onboardingStatus === 'loading') {
        return <div className="bg-brand-dark text-brand-text-primary flex items-center justify-center h-full p-4"><LoadingSpinner /> Initializing...</div>;
      }

      if (showApiManager) {
        return <ApiKeysManager initialGeminiKey={geminiApiKey} initialOpenAIKey={openaiApiKey} onSave={handleSaveKeys} onCancel={() => setShowApiManager(false)} isSaving={isSaving} />;
      }

      const mainButtonText = translateText ? 'Mirror & Translate' : 'Mirror Only';

      return (
        <div className="bg-brand-dark text-brand-text-primary font-sans flex flex-col h-full relative">
          {onboardingStatus === 'pending' && <OnboardingTour tourConfig={tourConfig} onComplete={handleOnboardingComplete} />}

          <AppMenu
            isOpen={isMenuOpen}
            onClose={() => setIsMenuOpen(false)}
            isPro={isPro}
            onManageSubscription={() => {
              setShowSubscriptionManager(true);
              setIsMenuOpen(false);
            }}
          />

          <header className="flex items-center justify-between p-4 flex-shrink-0 border-b border-brand-border">
            <div className="flex items-center space-x-3">
              <Logo />
              {isPro && (
                <div className="text-xs font-bold text-brand-teal bg-brand-teal/10 px-2.5 py-1 rounded-full border border-brand-teal/30">
                  PRO
                </div>
              )}
            </div>
            <div className="flex items-center space-x-2">
              {!isPro && trialCount !== null && (
                <div className="text-xs font-medium text-brand-text-secondary bg-brand-surface px-2 py-1 rounded-md">
                  {trialCount} / 15 trials
                </div>
              )}
              {!isPro && (
                <button
                  onClick={() => setShowUpgradeScreen(true)}
                  className="text-xs font-bold text-brand-teal bg-brand-teal/10 px-2.5 py-1 rounded-full border border-brand-teal/30 hover:bg-brand-teal/20 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-brand-dark focus:ring-brand-teal"
                  aria-label="Upgrade to Pro"
                >
                  GO PRO
                </button>
              )}
              <div ref={menuButtonRef}>
                <button onClick={() => setIsMenuOpen(true)} className="p-1 rounded-full hover:bg-brand-surface focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-brand-dark focus:ring-brand-teal" aria-label="Open menu">
                  <MenuIcon />
                </button>
              </div>
            </div>
          </header>

          {/* Tab Navigation */}
          <div className="flex border-b border-brand-border flex-shrink-0">
            <TabButton active={activeTab === 'mirror'} onClick={() => setActiveTab('mirror')}>
              Mirror & Translate
            </TabButton>
            <TabButton active={activeTab === 'fontChanger'} onClick={() => setActiveTab('fontChanger')}>
              Font Changer
            </TabButton>
          </div>

          <div className="flex-grow p-4 space-y-4 overflow-y-auto">
            {activeTab === 'mirror' && (
              <>
                <p className="text-left text-sm text-brand-text-secondary">
                  Select a frame to mirror or translate text with AI.
                </p>

                <div ref={langSelectorRef} className="bg-brand-surface rounded-xl p-4 border border-brand-border">
                  <div className="flex items-center justify-between">
                    <span className="font-font-semibold text-brand-text-primary">Translate Text</span>
                    <ToggleSwitch checked={translateText} onChange={setTranslateText} disabled={isLoading} />
                  </div>
                  <div className={`transition-all duration-300 ease-in-out overflow-hidden ${translateText ? 'max-h-48 opacity-100 pt-4' : 'max-h-0 opacity-0'}`}>
                    <div className="flex items-center justify-center space-x-2">
                      <LanguageSelector value={fromLanguage} onChange={(e) => setFromLanguage(e.target.value)} options={LANGUAGES} disabled={!translateText || isLoading} />
                      <button onClick={handleSwapLanguages} className="p-2 rounded-full hover:bg-brand-border focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-brand-surface focus:ring-brand-teal disabled:opacity-50" disabled={fromLanguage === 'auto' || !translateText || isLoading} aria-label="Swap languages">
                        <SwapIcon />
                      </button>
                      <LanguageSelector value={toLanguage} onChange={(e) => setToLanguage(e.target.value)} options={LANGUAGES.filter(lang => lang.code !== 'auto')} disabled={!translateText || isLoading} />
                    </div>
                  </div>
                </div>

                <div className="bg-brand-surface rounded-xl p-4 border border-brand-border">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center group relative">
                      <span className="font-font-medium text-brand-text-primary">Mirror Main Components</span>
                      <span className="ml-1.5 text-brand-text-secondary"><InfoIcon /></span>
                      <div className="absolute left-0 bottom-full mb-2 w-56 p-2.5 text-xs text-brand-text-secondary bg-brand-dark rounded-md border border-brand-border shadow-lg opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-10">
                        Create or reuse a mirrored target variant, arrange it beside its source, then swap the local nested instance to it.
                      </div>
                    </div>
                    <ToggleSwitch checked={mirrorInstances} onChange={setMirrorInstances} disabled={isLoading} />
                  </div>
                </div>

                <div ref={variantRef} className="bg-brand-surface rounded-xl p-4 border border-brand-border">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center group relative">
                      <span className="font-medium text-brand-text-primary">Create as Variant</span>
                      <span className="ml-1.5 text-brand-text-secondary"><InfoIcon /></span>
                      <div className="absolute left-0 bottom-full mb-2 w-56 p-2.5 text-xs text-brand-text-secondary bg-brand-dark rounded-md border border-brand-border shadow-lg opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-10">
                        Creates a new variant instead of modifying the selection. Select a single component or instance to use this.
                      </div>
                    </div>
                    <ToggleSwitch checked={createVariant} onChange={setCreateVariant} disabled={isLoading} />
                  </div>
                </div>

                {!hasAnyKey && translateText && (
                  <div className="text-xs text-center text-brand-teal-light p-3 bg-brand-teal/10 rounded-lg border border-brand-teal/20">
                    No API key found. Using a free service. <button onClick={() => setShowApiManager(true)} className="font-bold underline hover:text-white">Add Keys</button> for better translations.
                  </div>
                )}
              </>
            )}

            {activeTab === 'fontChanger' && (
              <>
                <p className="text-left text-sm text-brand-text-secondary">
                  Select at least one text layer
                </p>

                {/* Font Selection with Search */}
                <div className="bg-brand-surface rounded-xl p-4 border border-brand-border">
                  <label className="block font-font-medium text-brand-text-primary mb-2">Select Font</label>
                  {availableFonts.length === 0 ? (
                    <div className="text-center text-brand-text-secondary py-4">
                      <LoadingSpinner /> Loading fonts...
                    </div>
                  ) : (
                    <SearchableSelect
                      options={availableFonts}
                      value={selectedFont}
                      onChange={setSelectedFont}
                      placeholder="Select a font..."
                      disabled={isFontChanging}
                      recentOptions={recentFonts}
                    />
                  )}
                </div>

                {/* Weight Selection */}
                <div className="bg-brand-surface rounded-xl p-4 border border-brand-border">
                  <div className="flex items-center justify-between mb-2">
                    <label className="block font-regular text-brand-text-primary">Select Weight (Optional)</label>
                  </div>
                  <SearchableSelect
                    options={['Auto Match (Recommended)', ...fontStyles]}
                    value={selectedWeight || 'Auto Match (Recommended)'}
                    onChange={(val) => setSelectedWeight(val === 'Auto Match (Recommended)' ? '' : val)}
                    placeholder="Auto Match (Recommended)"
                    disabled={isFontChanging || !selectedFont || fontStyles.length === 0}
                    searchable={false}
                  />

                  <div className="flex items-center justify-between mt-4 pt-3 border-t border-brand-border/30">
                    <span className="text-sm text-brand-text-primary">Auto-Fit Text</span>
                    <ToggleSwitch checked={autoFitText} onChange={setAutoFitText} disabled={isFontChanging} />
                  </div>
                </div>

                {/* Text Layers Count removed as per user request */}
              </>
            )}
          </div>

          <footer className="flex-shrink-0 px-4 pt-4 pb-6 border-t border-brand-border">
            <div ref={mainActionRef} className="space-y-3">
              {activeTab === 'mirror' ? (
                <>
                  <Button onClick={() => handleAction('mirror-translate')} disabled={isLoading} isLoading={isLoading} variant="primary">
                    {mainButtonText}
                    <SparkleIcon />
                  </Button>
                  <Button onClick={() => handleAction('translate-only')} disabled={isLoading || !translateText} isLoading={isLoading && !progress} variant="soft-primary">
                    Translate Only
                  </Button>
                </>
              ) : (
                <Button
                  onClick={handleChangeFont}
                  disabled={isFontChanging || !selectedFont}
                  isLoading={isFontChanging}
                  variant="primary"
                >
                  Change Font
                </Button>
              )}
            </div>

            {(isLoading || statusMessage) && (
              <div className="mt-4 space-y-2">
                <p className={`text-center text-xs ${isError ? 'text-red-400 font-semibold' : 'text-brand-text-secondary'}`}>{statusMessage}</p>
                {progress && progress.total > 0 && (
                  <div className="w-full bg-brand-surface rounded-full h-1.5 mt-1 border border-brand-border">
                    <div className="bg-brand-teal h-1.5 rounded-full transition-all duration-200 ease-linear" style={{ width: `${(progress.processed / progress.total) * 100}%` }}></div>
                  </div>
                )}
              </div>
            )}
            <div ref={apiKeysRef} className="mt-4 text-center">
              <button onClick={() => setShowApiManager(true)} className="text-xs text-brand-text-secondary hover:text-brand-text-primary hover:underline focus:outline-none">Manage API Keys</button>
            </div>
          </footer>

          {showUpgradeScreen && (
            <div className="absolute inset-0 bg-brand-dark z-50 animate-fade-in">
              <UpgradeScreen
                onActivate={handleActivateLicense}
                isLoading={isActivating}
                error={activationError}
                onClose={() => setShowUpgradeScreen(false)}
              />
            </div>
          )}
          {showSubscriptionManager && isPro && (
            <SubscriptionManager
              onClose={() => setShowSubscriptionManager(false)}
              onUnsubscribe={() => setShowUnsubscribeConfirm(true)}
            />
          )}
          {showUnsubscribeConfirm && (
            <UnsubscribeConfirmation
              onCancel={() => setShowUnsubscribeConfirm(false)}
              onConfirm={handleUnsubscribe}
              isProcessing={isLoading}
            />
          )}
        </div>
      );
    };

    const rootElement = document.getElementById('root');
    if (!rootElement) { throw new Error("Could not find root element to mount to"); }
    const root = ReactDOM.createRoot(rootElement);
    root.render(<React.StrictMode><ErrorBoundary><App /></ErrorBoundary></React.StrictMode>);
  </script>
</body>
